naftiko: 1.0.0-alpha2
info:
  label: CryptoCompare min-api — News
  description: Crypto news article listing, source feeds, and category metadata.
  tags:
  - CryptoCompare
  - News
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    CRYPTOCOMPARE_API_KEY: CRYPTOCOMPARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: min-api-news
    baseUri: https://min-api.cryptocompare.com/data
    description: CryptoCompare min-api News business capability.
    headers:
    - name: Authorization
      value: 'Apikey {{env.CRYPTOCOMPARE_API_KEY}}'
    resources:
    - name: news-v2
      path: /v2/news/
      operations:
      - name: getlatestnewsarticles
        method: GET
        description: Get the most recent crypto news articles aggregated across integrated sources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: lang
          in: query
          type: string
        - name: feeds
          in: query
          type: string
        - name: categories
          in: query
          type: string
        - name: excludeCategories
          in: query
          type: string
        - name: lTs
          in: query
          type: integer
        - name: sortOrder
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: news-feeds
      path: /news/feeds
      operations:
      - name: getnewssources
        method: GET
        description: Get the list of news source feeds available for filtering.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters: []
    - name: news-categories
      path: /news/categories
      operations:
      - name: getnewscategories
        method: GET
        description: Get the list of news categories used for tagging articles.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters: []
    - name: news-feedsandcategories
      path: /news/feedsandcategories
      operations:
      - name: getnewsfeedsandcategories
        method: GET
        description: Get news source feeds and categories in a single call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters: []
