naftiko: 1.0.0-alpha2
info:
  label: CryptoCompare min-api — Top Lists
  description: 'Top list endpoints by 24h volume, market cap, pair volume, exchange volume, and top pairs.'
  tags:
  - CryptoCompare
  - Top Lists
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    CRYPTOCOMPARE_API_KEY: CRYPTOCOMPARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: min-api-top-lists
    baseUri: https://min-api.cryptocompare.com/data
    description: CryptoCompare min-api Top Lists business capability.
    headers:
    - name: Authorization
      value: 'Apikey {{env.CRYPTOCOMPARE_API_KEY}}'
    resources:
    - name: top-totalvolfull
      path: /top/totalvolfull
      operations:
      - name: gettoplistbytotalvolumefull
        method: GET
        description: Get top cryptocurrencies by 24h total volume with full ticker data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: tsym
          in: query
          type: string
          required: true
    - name: top-mktcapfull
      path: /top/mktcapfull
      operations:
      - name: gettoplistbymarketcapfull
        method: GET
        description: Get top cryptocurrencies by market capitalization with full ticker data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: tsym
          in: query
          type: string
          required: true
    - name: top-exchanges
      path: /top/exchanges
      operations:
      - name: gettopexchangesbypairvolume
        method: GET
        description: Get top exchanges ranked by 24h volume for a given pair.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: fsym
          in: query
          type: string
          required: true
        - name: tsym
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
    - name: top-exchanges-full
      path: /top/exchanges/full
      operations:
      - name: gettopexchangesfullbypairvolume
        method: GET
        description: Get top exchanges by 24h pair volume with full ticker data per exchange.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: fsym
          in: query
          type: string
          required: true
        - name: tsym
          in: query
          type: string
          required: true
    - name: top-volumes
      path: /top/volumes
      operations:
      - name: gettopvolumesbycurrency
        method: GET
        description: Get top cryptocurrencies by 24h volume against a given quote currency.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: tsym
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
    - name: top-pairs
      path: /top/pairs
      operations:
      - name: gettoppairsbyvolume
        method: GET
        description: Get most active trading pairs for a given from-symbol.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: fsym
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
