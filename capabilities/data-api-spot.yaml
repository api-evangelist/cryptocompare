naftiko: 1.0.0-alpha2
info:
  label: CoinDesk Data API — Spot
  description: Spot market data including latest tick, instrument metadata, historical OHLCV, trades, and order book L1 top.
  tags:
  - CoinDesk Data
  - Spot
  - Market Data
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    CRYPTOCOMPARE_API_KEY: CRYPTOCOMPARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-api-spot
    baseUri: https://data-api.cryptocompare.com
    description: CoinDesk Data API Spot business capability.
    headers:
    - name: Authorization
      value: 'Apikey {{env.CRYPTOCOMPARE_API_KEY}}'
    resources:
    - name: spot-latest-tick
      path: /spot/v1/latest/tick
      operations:
      - name: getspotlatesttick
        method: GET
        description: Get the latest tick for one or more spot instruments on a given market.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instruments
          in: query
          type: string
          required: true
        - name: groups
          in: query
          type: string
    - name: spot-markets
      path: /spot/v2/markets
      operations:
      - name: getspotmarketslist
        method: GET
        description: List integrated spot exchanges and their status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
    - name: spot-instrument-metadata
      path: /spot/v1/markets/instruments
      operations:
      - name: getspotinstrumentmetadata
        method: GET
        description: Get reference metadata for spot instruments on a given market.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instruments
          in: query
          type: string
    - name: spot-historical-days
      path: /spot/v1/historical/days
      operations:
      - name: getspothistoricaldaily
        method: GET
        description: Get daily OHLCV candles for a single spot instrument on a given market.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instrument
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: to_ts
          in: query
          type: integer
        - name: aggregate
          in: query
          type: integer
    - name: spot-historical-hours
      path: /spot/v1/historical/hours
      operations:
      - name: getspothistoricalhourly
        method: GET
        description: Get hourly OHLCV candles for a single spot instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instrument
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: to_ts
          in: query
          type: integer
    - name: spot-historical-minutes
      path: /spot/v1/historical/minutes
      operations:
      - name: getspothistoricalminute
        method: GET
        description: Get minute OHLCV candles for a single spot instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instrument
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: to_ts
          in: query
          type: integer
    - name: spot-historical-trades
      path: /spot/v1/historical/trades
      operations:
      - name: getspothistoricaltrades
        method: GET
        description: Get raw historical trade prints for a single spot instrument.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instrument
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: to_ts
          in: query
          type: integer
    - name: spot-orderbook-l1-top
      path: /spot/v1/latest/orderbook/l1/top
      operations:
      - name: getspotorderbookl1top
        method: GET
        description: Get top of order book (best bid/ask) for one or more spot instruments.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: market
          in: query
          type: string
          required: true
        - name: instruments
          in: query
          type: string
          required: true
