naftiko: 1.0.0-alpha2
info:
  label: CryptoCompare min-api — Historical OHLCV
  description: 'CryptoCompare min-api historical OHLCV candles by day, hour, and minute.'
  tags:
  - CryptoCompare
  - Historical
  - OHLCV
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    CRYPTOCOMPARE_API_KEY: CRYPTOCOMPARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: min-api-historical
    baseUri: https://min-api.cryptocompare.com/data
    description: CryptoCompare min-api Historical OHLCV business capability.
    headers:
    - name: Authorization
      value: 'Apikey {{env.CRYPTOCOMPARE_API_KEY}}'
    resources:
    - name: histoday
      path: /v2/histoday
      operations:
      - name: gethistoricaldailyohlcv
        method: GET
        description: Get daily OHLCV candles for a cryptocurrency pair. Up to 2000 candles per call.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: fsym
          in: query
          type: string
          required: true
        - name: tsym
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
          description: Number of data points (max 2000).
        - name: aggregate
          in: query
          type: integer
        - name: toTs
          in: query
          type: integer
        - name: e
          in: query
          type: string
    - name: histohour
      path: /v2/histohour
      operations:
      - name: gethistoricalhourlyohlcv
        method: GET
        description: Get hourly OHLCV candles for a cryptocurrency pair.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: fsym
          in: query
          type: string
          required: true
        - name: tsym
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: aggregate
          in: query
          type: integer
        - name: toTs
          in: query
          type: integer
        - name: e
          in: query
          type: string
    - name: histominute
      path: /v2/histominute
      operations:
      - name: gethistoricalminuteohlcv
        method: GET
        description: Get minute OHLCV candles for a cryptocurrency pair. Up to 7 days of history on free tier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: fsym
          in: query
          type: string
          required: true
        - name: tsym
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: aggregate
          in: query
          type: integer
        - name: toTs
          in: query
          type: integer
        - name: e
          in: query
          type: string
