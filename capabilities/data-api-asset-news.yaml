naftiko: 1.0.0-alpha2
info:
  label: CoinDesk Data API — Asset, News, On-Chain, Overview
  description: Asset reference data, news articles, sources, categories, on-chain metrics, and overview market cap.
  tags:
  - CoinDesk Data
  - Asset
  - News
  - On-Chain
  - Overview
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    CRYPTOCOMPARE_API_KEY: CRYPTOCOMPARE_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-api-asset-news
    baseUri: https://data-api.cryptocompare.com
    description: CoinDesk Data API Asset, News, On-Chain, Overview business capability.
    headers:
    - name: Authorization
      value: 'Apikey {{env.CRYPTOCOMPARE_API_KEY}}'
    resources:
    - name: asset-top-list
      path: /asset/v1/top/list
      operations:
      - name: getassettoplist
        method: GET
        description: Get top assets ranked by market cap or volume.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: sort_by
          in: query
          type: string
        - name: sort_direction
          in: query
          type: string
    - name: asset-by-symbol
      path: /asset/v1/data/by/symbol
      operations:
      - name: getassetbysymbol
        method: GET
        description: Get detailed asset metadata for a single asset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: asset_symbol
          in: query
          type: string
          required: true
        - name: asset_lookup_priority
          in: query
          type: string
    - name: asset-historical-supply-days
      path: /asset/v1/historical/supply/days
      operations:
      - name: getassethistoricalsupplydaily
        method: GET
        description: Get daily history of asset supply.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: asset
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: to_ts
          in: query
          type: integer
    - name: news-article-list
      path: /news/v1/article/list
      operations:
      - name: getnewsarticlelist
        method: GET
        description: Get the most recent news articles across all integrated sources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: lang
          in: query
          type: string
        - name: source_ids
          in: query
          type: string
        - name: categories
          in: query
          type: string
        - name: search_string
          in: query
          type: string
        - name: to_ts
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: news-source-list
      path: /news/v1/source/list
      operations:
      - name: getnewssourcelist
        method: GET
        description: Get the list of integrated news sources.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: lang
          in: query
          type: string
        - name: source_type
          in: query
          type: string
    - name: news-category-list
      path: /news/v1/category/list
      operations:
      - name: getnewscategorylist
        method: GET
        description: Get the list of news categories used for tagging articles.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters: []
    - name: onchain-supply-days
      path: /onchain/v1/historical/supply/days
      operations:
      - name: getonchainhistoricalsupplydaily
        method: GET
        description: Get daily on-chain supply history.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: chain_symbol
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
    - name: onchain-active-addresses-days
      path: /onchain/v1/historical/active-addresses/days
      operations:
      - name: getonchainhistoricalactiveaddressesdaily
        method: GET
        description: Get daily active address counts for a given chain.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: chain_symbol
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
    - name: overview-marketcap-days
      path: /overview/v1/historical/marketcap/all-assets/days
      operations:
      - name: getoverviewhistoricalmarketcapdaily
        method: GET
        description: Get daily history of total crypto market cap across all tracked assets.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.Data
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: to_ts
          in: query
          type: integer
        - name: quote_asset
          in: query
          type: string
